name: Bug Report
description: Report a defect in Surge POS
labels: [bug, needs-triage]
assignees: [Ujjwal-Aggrawal2279]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: Surge POS version
      placeholder: e.g. v0.2.1
    validations:
      required: true

  - type: input
    id: erpnext
    attributes:
      label: ERPNext / Frappe version
      placeholder: e.g. ERPNext v15.12
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Login / Cashier PIN
        - Item grid / search
        - Cart
        - Payment / invoice submission
        - Offline sync
        - Reports
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the POS terminal at /surge
        2. Add item X to cart
        3. Click Payment
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Browser console / server logs
      render: text
