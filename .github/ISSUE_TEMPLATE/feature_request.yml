name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe it below and we'll discuss feasibility.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Login / session management
        - Item catalog / search
        - Cart & discounts
        - Payment methods
        - Receipts / printing
        - Offline / sync
        - Compliance / reporting
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What pain point does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
