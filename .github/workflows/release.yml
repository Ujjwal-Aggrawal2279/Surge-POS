name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend and verify committed dist is current
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:no-bench
          git diff --exit-code ../surge/public/dist/ ../surge/www/surge.html || \
            (echo "❌ Tag was pushed with a stale dist/. Rebuild locally, commit the dist, then re-tag." && exit 1)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Surge POS ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
