name: Surge POS CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: surge-ci-${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Fast Checks (~90s) ─────────────────────────────────────────────────
jobs:
  fast-checks:
    name: "Fast Checks (ruff · tsc · build)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Python syntax check (all API + utils files)
        run: |
          python -m py_compile \
            surge/api/auth.py \
            surge/api/invoices.py \
            surge/api/session.py \
            surge/api/items.py \
            surge/api/stock.py \
            surge/api/customers.py \
            surge/api/sync.py \
            surge/api/dashboard.py \
            surge/utils/permissions.py \
            surge/overrides/sales_invoice.py \
            surge/jobs/queue.py

      - name: Ruff lint
        run: ruff check surge/ --output-format=github

      - name: Ruff format check
        run: ruff format surge/ --check

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: TypeScript type check
        run: pnpm typecheck
        working-directory: web

      - name: Frontend build + verify committed dist is current
        run: |
          pnpm build
          git diff --exit-code ../surge/public/dist/ ../surge/www/surge.html || \
            (echo "❌ Committed dist/ is stale. Run 'pnpm build' in web/ locally and commit the updated surge/public/dist/ and surge/www/surge.html before pushing." && exit 1)
        working-directory: web

# ── Job 2: AST Scan + Unit Tests ──────────────────────────────────────────────
  scan-and-unit:
    name: "AST Scan + Unit Tests (Hypothesis)"
    runs-on: ubuntu-22.04
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install pytest hypothesis pytest-cov msgspec cachetools orjson werkzeug

      - name: "Step 2a — AST scan: discover all @whitelist endpoints"
        run: |
          python scripts/generate_tests.py
          echo "--- Generated manifest ---"
          cat surge/tests/generated/manifest.json | python3 -m json.tool --no-ensure-ascii

      - name: "Step 2b — Coverage gate: every endpoint must have validation or a guard"
        run: python scripts/generate_tests.py --check-coverage

      - name: "Step 2c — Unit tests (Hypothesis, no DB required)"
        run: |
          pytest surge/tests/unit/ \
            -v \
            --tb=short \
            --hypothesis-seed=0 \
            --no-cov

      - name: Upload unit coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage-unit.xml

# ── Job 3: Integration Tests (Frappe + MariaDB + Redis) ──────────────────────
  integration:
    name: "Integration Tests (Frappe ${{ matrix.frappe_branch }})"
    runs-on: ubuntu-22.04
    needs: fast-checks

    strategy:
      fail-fast: false
      matrix:
        include:
          - frappe_branch: version-16
            python_version: "3.14"

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: travis
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3
        ports:
          - 3306:3306

      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379

      redis-queue:
        image: redis:7-alpine
        ports:
          - 6380:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          check-latest: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcups2-dev redis-server mariadb-client wkhtmltopdf libssl-dev

      - name: Install frappe-bench
        run: pip install frappe-bench

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: bench-pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: bench-pip-${{ runner.os }}-

      - name: Initialize frappe bench
        run: |
          bench init \
            --skip-assets \
            --skip-redis-config-generation \
            --frappe-branch ${{ matrix.frappe_branch }} \
            frappe-bench
        env:
          CI: true

      - name: Get ERPNext, india_compliance, and Surge
        run: |
          cd frappe-bench
          bench get-app erpnext --branch ${{ matrix.frappe_branch }}
          bench get-app https://github.com/resilient-tech/india-compliance --branch ${{ matrix.frappe_branch }}
          bench get-app surge ${{ github.workspace }}

      - name: Configure Redis (TCP, no socket)
        run: |
          cd frappe-bench
          cat > sites/common_site_config.json << 'EOF'
          {
            "db_host": "127.0.0.1",
            "db_port": 3306,
            "redis_cache": "redis://localhost:6379",
            "redis_queue": "redis://localhost:6380",
            "redis_socketio": "redis://localhost:6379",
            "socketio_port": 9000
          }
          EOF

      - name: Create test site and install apps
        run: |
          cd frappe-bench
          bench new-site test.localhost \
            --mariadb-root-password travis \
            --admin-password admin \
            --no-mariadb-socket
          bench --site test.localhost install-app erpnext
          bench --site test.localhost install-app india_compliance
          bench --site test.localhost install-app surge
          bench --site test.localhost migrate
        env:
          CI: true

      - name: Install test dependencies in bench env
        run: |
          cd frappe-bench
          ./env/bin/pip install pytest hypothesis msgspec coverage

      - name: "Run integration tests — Groups A–G"
        run: |
          cd frappe-bench
          bench --site test.localhost run-parallel-tests \
            --app surge \
            --with-coverage
        env:
          CI: true

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration-${{ matrix.frappe_branch }}
          path: frappe-bench/sites/coverage.xml

# ── Job 4: E2E Tests (Playwright) ────────────────────────────────────────────
  e2e:
    name: "E2E Tests (Playwright — Groups D, E, H)"
    runs-on: ubuntu-22.04
    needs: fast-checks

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: web

      - name: Start Vite dev server
        run: pnpm dev &
        working-directory: web
        env:
          VITE_API_BASE: http://localhost:8000
          VITE_BASE: /

      - name: Wait for dev server
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 1; done'

      - name: "Run E2E tests"
        run: npx playwright test --config=e2e/playwright.config.ts
        working-directory: web

      - name: Upload Playwright failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: web/e2e/test-results/
          retention-days: 7
